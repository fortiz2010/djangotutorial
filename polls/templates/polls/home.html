
{% extends 'polls/base.html' %}

{% block content %}

<h1>Inicio</h1>
<hr>

{% if request.user.is_authenticated %}
<h4>Bienvenido, {{ user.username | upper }}</h4>
{% endif %}

{% if latest_answered_question %}
<h3>Última encuesta contestada:</h3>
<p>
    <a href="{% url 'polls:detail' latest_answered_question.id %}">{{ latest_answered_question.question_text }}</a>
</p>
{% endif %}

{% endblock %}
<!-- #modificado -->
